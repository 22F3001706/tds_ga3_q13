name: Scrape Table Sums (22f3001706@ds.study.iitm.ac.in)

on: [push]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
        
      - name: Install Playwright browsers (QA check by 22f3001706@ds.study.iitm.ac.in)
        run: npx playwright install --with-deps
      
      - name: Run scraping script and sum tables
        run: node scrape.js
